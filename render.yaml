services:
  - type: web
    name: og-model-assistant
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        generateValue: true
        type: postgres
      - key: REDIS_URL
        generateValue: true
        type: redis
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 10000
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PRIVATE_KEY
        value: your_opengradient_private_key_here
      - key: MEMSYNC_API_KEY
        value: your_memsync_api_key
      - key: TWINS_API_KEY
        value: your_twins_api_key
      - key: OG_EMAIL
        value: your_email@example.com
      - key: OG_PASSWORD
        value: your_password
    disk:
      name: logs
      mountPath: /app/logs
      sizeGB: 1
    domains:
      - og-model-assistant.onrender.com
